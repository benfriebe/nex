name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"
  SIGNING_IDENTITY: "Developer ID Application: BENJAMIN RYAN FRIEBE (4ASXCG2599)"

jobs:
  release:
    runs-on: macos-15
    environment: Nex
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DEVELOPER_ID_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build libghostty
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Doptimize=ReleaseFast -Demit-macos-app=false
          mkdir -p ../lib
          MACOS_LIB=$(find . "$ZIG_LOCAL_CACHE_DIR" -path "*/macos-*/libghostty.a" -type f 2>/dev/null | head -1)
          if [ -z "$MACOS_LIB" ]; then
            echo "::error::Could not find macOS libghostty.a in xcframework output"
            find . "$ZIG_LOCAL_CACHE_DIR" -name "libghostty*" -type f 2>/dev/null
            exit 1
          fi
          cp "$MACOS_LIB" ../lib/libghostty.a

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate --spec project.yml

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme Nex \
            -configuration Release \
            -archivePath build/Nex.xcarchive \
            -skipMacroValidation \
            CURRENT_PROJECT_VERSION=${{ steps.version.outputs.version }} \
            MARKETING_VERSION=${{ steps.version.outputs.version }}

      - name: Sign app
        run: |
          APP_PATH="build/Nex.xcarchive/Products/Applications/Nex.app"
          codesign --force --deep --sign "$SIGNING_IDENTITY" --timestamp --options runtime \
            --entitlements Nex/Nex.entitlements "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: "4ASXCG2599"
        run: |
          APP_PATH="build/Nex.xcarchive/Products/Applications/Nex.app"

          ditto -c -k --keepParent "$APP_PATH" build/Nex.zip
          xcrun notarytool submit build/Nex.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          rm build/Nex.zip

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p build/dmg
          cp -R build/Nex.xcarchive/Products/Applications/Nex.app build/dmg/
          create-dmg \
            --volname "Nex" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Nex.app" 150 190 \
            --app-drop-link 450 190 \
            "build/Nex-${{ steps.version.outputs.version }}.dmg" \
            "build/dmg/"

      - name: Sign DMG with Sparkle
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_TAG=$(curl -sI "https://github.com/sparkle-project/Sparkle/releases/latest" | grep -i location | sed 's/.*tag\///' | tr -d '\r')
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle

          DMG="build/Nex-${{ steps.version.outputs.version }}.dmg"

          OUTPUT=$(/tmp/sparkle/bin/sign_update "$DMG" -f <(printf '%s' "$SPARKLE_PRIVATE_KEY"))

          SIGNATURE=$(echo "$OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(stat -f%z "$DMG")

          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"
          echo "length=${LENGTH}" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SIGNATURE: ${{ steps.sign.outputs.signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, datetime, email.utils

          version = os.environ["VERSION"]
          signature = os.environ["SIGNATURE"]
          length = os.environ["LENGTH"]
          tag = os.environ["TAG_NAME"]
          repo = os.environ["REPO"]
          pub_date = email.utils.formatdate(localtime=True)
          dmg_url = f"https://github.com/{repo}/releases/download/{tag}/Nex-{version}.dmg"

          item = f"""    <item>
              <title>Version {version}</title>
              <pubDate>{pub_date}</pubDate>
              <sparkle:version>{version}</sparkle:version>
              <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <enclosure
                url="{dmg_url}"
                sparkle:edSignature="{signature}"
                length="{length}"
                type="application/octet-stream" />
            </item>"""

          with open("appcast.xml") as f:
              content = f.read()

          content = content.replace("  </channel>", item + "\n  </channel>", 1)

          with open("appcast.xml", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "release: update appcast for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Nex-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          draft: false
