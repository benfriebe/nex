excluded:
  - ghostty/
  - .build/
  - Nex.xcodeproj/

disabled_rules:
  - line_length
  - file_length
  - function_body_length
  - type_body_length
  - cyclomatic_complexity
  - nesting
  - todo
  - trailing_comma
  - trailing_newline
  - no_fallthrough_only
  - multiple_closures_with_trailing_closure
  - for_where
  - void_function_in_ternary

identifier_name:
  min_length:
    warning: 1

function_parameter_count:
  warning: 6

large_tuple:
  warning: 4

force_try:
  severity: warning
