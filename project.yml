name: Nex
options:
  bundleIdPrefix: com.nex
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    version: 1.17.1
  GRDB:
    url: https://github.com/groue/GRDB.swift
    version: 7.3.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.5.0"

targets:
  Nex:
    type: application
    platform: macOS
    sources:
      - path: Nex
        excludes:
          - "**/*.h"
          - "**/*.c"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nex.app
        PRODUCT_NAME: Nex
        INFOPLIST_FILE: Nex/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nex/Nex.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Nex/Ghostty/Ghostty-Bridging-Header.h
        OTHER_LDFLAGS:
          - "-lc++"
          - "-lz"
          - "-L$(SRCROOT)/lib"
          - "-lghostty"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ghostty/include"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: ComposableArchitecture
      - package: GRDB
        product: GRDB
      - package: Sparkle
      - package: swift-markdown
        product: Markdown
      - sdk: Metal.framework
      - sdk: WebKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreText.framework
      - sdk: AppKit.framework
      - sdk: IOKit.framework
      - sdk: Foundation.framework
      - sdk: Carbon.framework
    postCompileScripts:
      - script: |
          swiftc -O -target arm64-apple-macos14.0 -o "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/MacOS/nex-notify" "${SRCROOT}/Tools/nex-notify/nex-notify.swift"
          mkdir -p "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts"
          cp "${SRCROOT}/scripts/install-hooks.sh" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts/install-hooks.sh"
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/scripts/install-hooks.sh"
        name: Bundle nex-notify and install script

  NexTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NexTests
    dependencies:
      - target: Nex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nex.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nex.app/Contents/MacOS/Nex"
        BUNDLE_LOADER: "$(TEST_HOST)"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ghostty/include"
